<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Louie & Febian @ 50</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #111 0%, #000 70%, #0a0a0a 100%);
  color: #f7e7ce; /* champagne */
  text-align: center;
  line-height: 1.6;
}

/* Scroll animation */
section {
  padding: 80px 20px;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

.card {
  max-width: 500px;
  margin: auto;
  border: 1px solid #d4af37;
  padding: 20px;
  border-radius: 15px;
  background: rgba(247, 231, 206, 0.05); /* champagne glow */
  box-shadow: 0 0 15px rgba(212,175,55,0.15);
}

img {
  width: 100%;
  border-radius: 12px;
  border: 2px solid #d4af37;
}

h1 {
  font-size: 2rem;
  color: #d4af37;
}

h2 {
  color: #d4af37;
}

/* Buttons */
button {
  background: linear-gradient(45deg, #d4af37, #f1d77a);
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #d4af37;
  background: rgba(0,0,0,0.4);
  color: #f7e7ce;
}

/* Countdown */
#countdown {
  font-size: 22px;
  margin-top: 10px;
  color: #f7e7ce;
}

/* QR */
#qrcode {
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- 🎉 HERO -->
<section class="reveal">
  <h1>Louie & Febian @ 50</h1>
  <p>A Milestone Celebration</p>
  <img src="louie.jpg">
</section>

<!-- 📍 DETAILS -->
<section class="reveal">
  <div class="card">
    <h2>Event Details</h2>
    <p><strong>Date:</strong> May 31, 2026 | Sunday | 2:00 PM</p>
    <p><strong>Venue:</strong> Camaligan NHS Covered Court | Camaligan, Batan, Aklan</p>
  </div>
</section>

<!-- 👗 DRESS CODE -->
<section class="reveal">
  <div class="card">
    <h2>Dress Code</h2>
    <img src="https://via.placeholder.com/500x300">
    <p>Elegant Black, Gold & Champagne Attire</p>
  </div>
</section>

<!-- 📊 RSVP -->
<section class="reveal">
  <div class="card">
    <h2>RSVP</h2>

    <form action="https://api.web3forms.com/submit" method="POST">
  <input type="hidden" name="access_key" value="b0a47447-6ece-42e3-bd87-27dd68ccb1f6">
  <input type="text" name="name" required>
  
  <textarea name="number_invited_guest" required></textarea>
  <button type="submit">Submit</button>

    </form>
  </div>
</section>

<!-- 🎯 COUNTDOWN + QR -->
<section class="reveal">
  <div class="card">
    <div id="countdown"></div>
    <div id="qrcode"></div>
  </div>
</section>

<!-- 🎵 MUSIC -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- JS -->
<script>

// FADE IN
const sections = document.querySelectorAll('.reveal');

window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add('show');
    }
  });
});

// COUNTDOWN
const eventDate = new Date("May 31, 2026 14:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = eventDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));

  document.getElementById("countdown").innerHTML =
    "⏳ " + days + " days left before the celebration!";
}, 1000);

// QR CODE
const qr = document.createElement("img");
qr.src =
  "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" +
  window.location.href;

document.getElementById("qrcode").appendChild(qr);

</script>

</body>
</html>
