<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Louie & Febian @ 50</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: #d4af37;
  text-align: center;
  line-height: 1.6;
}

/* Scroll animation */
section {
  padding: 80px 20px;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

.card {
  max-width: 500px;
  margin: auto;
  border: 1px solid #d4af37;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
}

img {
  width: 100%;
  border-radius: 12px;
  border: 2px solid #d4af37;
}

h1 {
  font-size: 2rem;
}

/* Buttons */
button {
  background: linear-gradient(45deg, #d4af37, #f1d77a);
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* Countdown */
#countdown {
  font-size: 24px;
  margin-top: 10px;
}

/* QR */
#qrcode {
  margin-top: 20px;
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #d4af37;
  background: rgba(255,255,255,0.05);
  color: white;
}
</style>
</head>

<body>

<!-- 🎉 HERO -->
<section class="reveal">
  <h1>Louie & Febian @ 50</h1>
  <p>A Milestone Celebration</p>
    <img src="louie.jpg">

</section>

<!-- 📍 DETAILS -->
<section class="reveal">
  <div class="card">
          <h2>Event Details</h2>
   <p>Date: May 31, 2026 | SUNDAY | 2:00 PM  </p> 
    <p>Venue: Camaligan NHS Covered Court | Camaligan, Batan, Aklan</p>
  
  </div>
</section>

<!-- 👗 DRESS CODE -->
<section class="reveal">
  <div class="card">
    <h2>Dress Code</h2>
    <img src="https://via.placeholder.com/500x300">
    <p>Elegant Black & Gold Attire</p>
    <p>(Black, Gold, Champagne tones)</p>
  </div>
</section>

<!-- 📊 RSVP (REAL EMAIL SENDING) -->
<section class="reveal">
  <div class="card">
    <h2>RSVP</h2>

    <form action="https://api.web3forms.com/submit" method="POST">

      <!-- YOUR ACCESS KEY -->
      <input type="hidden" name="access_key" value="ae128842-27c4-4b78-9123-a4464b0f225e">

      <!-- EMAIL SUBJECT -->
      <input type="hidden" name="subject" value="New RSVP - Louie & Febian @ 50">

      <!-- DISABLE CAPTCHA -->
      <input type="hidden" name="captcha" value="false">

      <input type="text" name="name" placeholder="Your Name" required>

      <input type="email" name="email" placeholder="Your Email" required>

      <textarea name="message" placeholder="Message / Number of Guests" required></textarea>

      <button type="submit">Confirm Attendance</button>

    </form>

  </div>
</section>

<!-- 🎯 QR CODE -->
<section class="reveal">
  <div class="card">
     <div id="countdown"></div>
  </div>
</section>

<!-- 🎵 MUSIC (optional) -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- JS -->
<script>
// FADE-IN ON SCROLL
const sections = document.querySelectorAll('.reveal');

window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add('show');
    }
  });
});

// COUNTDOWN
const eventDate = new Date("June 15, 2026 17:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = eventDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));

  document.getElementById("countdown").innerHTML =
    "⏳ " + days + " days left before the big day!";
}, 1000);

// QR CODE GENERATOR
const qr = document.createElement("img");
qr.src =
  "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" +
  window.location.href;

document.getElementById("qrcode").appendChild(qr);
</script>

</body>
</html>
