<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Louie & Febian @ 50</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: #d4af37;
  text-align: center;
}

/* Sections */
section {
  padding: 80px 20px;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

.card {
  max-width: 500px;
  margin: auto;
  border: 1px solid #d4af37;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
}

img {
  width: 100%;
  border-radius: 12px;
  border: 2px solid #d4af37;
}

/* Buttons */
button {
  background: linear-gradient(45deg, #d4af37, #f1d77a);
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  font-weight: bold;
}

/* Countdown */
#countdown {
  font-size: 24px;
  margin-top: 10px;
}

/* QR */
#qrcode {
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- 🎉 HERO -->
<section class="reveal">
  <h1>Louie & Febian @ 50</h1>
  <p>A Milestone Celebration</p>
  <div id="countdown"></div>
</section>

<!-- 📍 DETAILS -->
<section class="reveal">
  <div class="card">
    <h2>Event Details</h2>
    <img src="https://via.placeholder.com/500x300">
    <p>June 15, 2026 | 5:00 PM</p>
  </div>
</section>

<!-- 👗 DRESS CODE -->
<section class="reveal">
  <div class="card">
    <h2>Dress Code</h2>
    <p>Black & Gold Elegant Attire</p>
  </div>
</section>

<!-- 📊 RSVP -->
<section class="reveal">
  <div class="card">
    <h2>RSVP</h2>

    <form onsubmit="return submitRSVP(event)">
      <input type="text" id="name" placeholder="Your Name" required style="width:100%;padding:10px;">
      <br><br>
      <button type="submit">Confirm Attendance</button>
    </form>

    <p id="success"></p>
  </div>
</section>

<!-- 🎯 QR CODE -->
<section class="reveal">
  <div class="card">
    <h2>Share Invite</h2>
    <div id="qrcode"></div>
  </div>
</section>

<!-- 🎵 MUSIC (optional) -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- JS -->
<script>
// FADE IN SCROLL
const sections = document.querySelectorAll('.reveal');

window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add('show');
    }
  });
});

// COUNTDOWN
const eventDate = new Date("June 15, 2026 17:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = eventDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  document.getElementById("countdown").innerHTML =
    "⏳ " + days + " days left";
}, 1000);

// RSVP SUCCESS PAGE (simple)
function submitRSVP(e) {
  e.preventDefault();
  document.getElementById("success").innerText =
    "🎉 Thank you for confirming!";
  return false;
}

// QR CODE
const qr = document.createElement("img");
qr.src =
  "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" +
  window.location.href;
document.getElementById("qrcode").appendChild(qr);
</script>

</body>
</html>
